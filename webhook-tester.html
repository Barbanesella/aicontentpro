<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Webhook Tester</title>
<style>
body{font-family:system-ui;max-width:500px;margin:60px auto;padding:20px;background:#f5f5f5}
h2{margin-bottom:24px}
label{display:block;font-size:13px;font-weight:500;margin-bottom:6px;color:#444}
input,select{width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;margin-bottom:16px;box-sizing:border-box}
button{width:100%;padding:12px;background:#d4521a;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:500;cursor:pointer}
pre{background:#1a1a1a;color:#4ade80;padding:16px;border-radius:8px;font-size:13px;margin-top:20px;white-space:pre-wrap;word-break:break-all}
</style>
</head>
<body>
<h2>🧪 Webhook Tester</h2>

<label>Email пользователя</label>
<input type="email" id="email" placeholder="твой@email.com"/>

<label>Тариф (сумма)</label>
<select id="amount">
  <option value="149">Starter — $149</option>
  <option value="399" selected>Growth — $399</option>
  <option value="899">Pro — $899</option>
</select>

<button onclick="test()">Отправить тестовый платёж</button>

<pre id="result">Результат появится здесь...</pre>

<script>
async function test() {
  const email = document.getElementById('email').value
  const amount = document.getElementById('amount').value
  if (!email) return alert('Введи email')

  document.getElementById('result').textContent = 'Отправляю...'

  try {
    const res = await fetch('/api/payment-webhook', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        payment_status: 'finished',
        order_id: `test-${Date.now()}`,
        price_amount: amount,
        payer_email: email,
        payment_id: `test-${Date.now()}`
      })
    })
    const data = await res.json()
    document.getElementById('result').textContent = JSON.stringify(data, null, 2)
  } catch(e) {
    document.getElementById('result').textContent = 'Ошибка: ' + e.message
  }
}
</script>
</body>
</html>
